<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Validação de Formulário</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="mb-4">Cadastro de Endereço</h2>

  <form id="formulario">

    <!-- Nome -->
    <div class="mb-3">
      <label>Nome</label>
      <input type="text" class="form-control" required>
    </div>

    <!-- CPF -->
    <div class="mb-3">
      <label>CPF</label>
      <input type="text" id="cpf" class="form-control" required>
      <small id="cpfMsg"></small>
    </div>

    <!-- CEP -->
    <div class="mb-3">
      <label>CEP</label>
      <input type="text" id="cep" class="form-control" required>
    </div>

    <!-- Endereço -->
    <div class="mb-3">
      <label>Endereço</label>
      <input type="text" id="endereco" class="form-control" required>
    </div>

    <!-- Número -->
    <div class="mb-3">
      <label>Número</label>
      <input type="number" class="form-control" required>
    </div>

    <!-- Complemento -->
    <div class="mb-3">
      <label>Complemento (opcional)</label>
      <input type="text" class="form-control">
    </div>

    <!-- Bairro -->
    <div class="mb-3">
      <label>Bairro</label>
      <input type="text" id="bairro" class="form-control" required>
    </div>

    <!-- Cidade -->
    <div class="mb-3">
      <label>Cidade</label>
      <input type="text" id="cidade" class="form-control" required>
    </div>

    <!-- Estado -->
    <div class="mb-3">
      <label>Estado</label>
      <input type="text" id="estado" class="form-control" required>
    </div>

    <button class="btn btn-primary">Enviar</button>

  </form>
</div>

<script src="script.js"></script>
</body>
</html>
